workflows:
  ios-testflight-workflow:
    name: iOS TestFlight Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: 25MGGRN898   # <-- see note below

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.carisca.summit2025
      vars:
        BUNDLE_ID: "com.carisca.summit2025"
      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get

      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles

      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -maxdepth 2 -execdir pod install \;

      - name: Flutter build ipa (release, auto-increment build number)
        script: |
          flutter build ipa --release \
            --build-number=$(($(app-store-connect get-latest-app-store-build-number "$BUNDLE_ID") + 1)) \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - aopoku255@gmail.com
        notify:
          success: true
          failure: true

      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
